# ══════════════════════════════════════════════════════════════════
#  02-backend.yaml — Backend API Deployment
#  IMPORTANT: Run generate-secrets.sh before applying this!
# ══════════════════════════════════════════════════════════════════

# ── Backend Deployment ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-backend
  namespace: banking
  labels:
    app: banking-backend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero downtime
  template:
    metadata:
      labels:
        app: banking-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: backend
          # ← Jenkins will update this tag automatically
          image: YOURDOCKERHUBUSER/banking-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
            - name: JWT_EXPIRES
              value: "24h"
            # Secrets from K8s Secret (run generate-secrets.sh first)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MONGO_URI
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false

---
# ── Backend Service ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: banking-backend-service
  namespace: banking
  labels:
    app: banking-backend
spec:
  selector:
    app: banking-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP

---
# ── HPA — Auto-scale 2 to 6 pods ──────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-backend-hpa
  namespace: banking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
