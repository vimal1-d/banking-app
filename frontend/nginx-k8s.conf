# ══════════════════════════════════════════════════════════════════
#  nginx-k8s.conf — KUBERNETES version
#  Uses banking-backend-service (k8s service name)
#  In k8s/03-frontend.yaml, mount this as ConfigMap
# ══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Kubernetes backend service name
    location /api/ {
        proxy_pass         http://banking-backend-service:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    add_header X-Frame-Options       "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"      always;

    error_page 404 /index.html;
}
