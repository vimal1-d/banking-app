# ══════════════════════════════════════════════════════════════════
#  nginx.conf — works for BOTH Docker Compose AND Kubernetes
#  Backend service name comes from env variable BACKEND_HOST
#  Docker Compose: service name = "backend"
#  Kubernetes:     service name = "banking-backend-service"
#  Default fallback = "backend" (docker compose)
# ══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss text/javascript;

    # ── Frontend static files ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── API proxy to backend ─────────────────────────────────────
    # Docker Compose: backend container = "backend"
    # Kubernetes:     service = "banking-backend-service"
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # CORS for development
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ── Health check endpoint ────────────────────────────────────
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"    always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Error pages ──────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
