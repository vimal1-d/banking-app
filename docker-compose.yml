version: "3.9"

# ══════════════════════════════════════════════════════════════════
#  NovaBanc — Docker Compose
#  Local development & testing
#  Usage: docker compose up --build
# ══════════════════════════════════════════════════════════════════

services:

  # ── 1. MongoDB Database ────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: banking-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: bankingdb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    networks:
      - banking-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 2. Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: banking-backend:local
    container_name: banking-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: development
      # Use mongodb (service name) NOT mongodb-service here
      MONGO_URI: "mongodb://admin:changeme@mongodb:27017/bankingdb?authSource=admin"
      JWT_SECRET: "local-dev-jwt-secret-please-change-in-production"
      JWT_EXPIRES: "24h"
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80"
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - banking-net
    # NO volume mount for src in production image — it would override the image files!
    # For hot reload dev, use: docker compose -f docker-compose.dev.yml up

  # ── 3. Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: banking-frontend:local
    container_name: banking-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - banking-net

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  mongo-data:
    name: banking-mongo-data

# ── Networks ───────────────────────────────────────────────────────
networks:
  banking-net:
    name: banking-network
    driver: bridge
